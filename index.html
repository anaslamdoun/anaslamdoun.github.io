<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Tees - T-Shirt Shop</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: #ff9800;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('hero-image.jpg') no-repeat center center/cover;
            height: 60vh;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }
        .hero h1 {
            font-size: 3rem;
            margin: 0;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            padding: 2rem;
        }
        .product {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
        }
        .product img {
            width: 100%;
            height: auto;
        }
        .product h2 {
            font-size: 1.5rem;
            margin: 0.5rem 0;
        }
        .product p {
            margin: 0.5rem 0;
            color: #666;
        }
        .product button {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1rem;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Stylish Tees</h1>
    </header>
    <div class="hero">
        <h1>Find Your Perfect T-Shirt</h1>
    </div>
    <main>
        <section class="products">
            <div class="product">
                <img src="tshirt1.jpg" alt="Cool T-Shirt">
                <h2>Cool T-Shirt</h2>
                <p>$19.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="tshirt2.jpg" alt="Trendy T-Shirt">
                <h2>Trendy T-Shirt</h2>
                <p>$24.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="tshirt3.jpg" alt="Classic T-Shirt">
                <h2>Classic T-Shirt</h2>
                <p>$29.99</p>
                <button>Add to Cart</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Stylish Tees. All Rights Reserved.</p>
    </footer>
</body>
</html>
